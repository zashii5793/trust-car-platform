name: Weekly PM Report

# 毎週月曜 9:00 JST（= UTC 0:00）に自動実行
# 手動実行も可能
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      report_type:
        description: 'レポート種別'
        required: false
        default: 'weekly'
        type: choice
        options:
          - weekly
          - launch_check

jobs:
  pm-report:
    name: PM Status Report
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全コミット履歴（週次diff用）

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # ── 品質チェック ────────────────────────────────────────────────────────

      - name: Run static analysis
        id: analyze
        run: |
          flutter analyze 2>&1 | tee analyze_output.txt
          ISSUE_COUNT=$(grep -c "^  " analyze_output.txt || echo "0")
          echo "issue_count=$ISSUE_COUNT" >> $GITHUB_OUTPUT
          if flutter analyze > /dev/null 2>&1; then
            echo "status=clean" >> $GITHUB_OUTPUT
          else
            echo "status=issues" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        id: tests
        run: |
          flutter test --exclude-tags emulator 2>&1 | tee test_output.txt
          PASS=$(grep -oP '\+\K[0-9]+(?=:)' test_output.txt | tail -1 || echo "0")
          FAIL=$(grep -oP '-\K[0-9]+(?=:)' test_output.txt | tail -1 || echo "0")
          echo "passed=$PASS" >> $GITHUB_OUTPUT
          echo "failed=$FAIL" >> $GITHUB_OUTPUT
          if [ "$FAIL" = "0" ]; then
            echo "status=green" >> $GITHUB_OUTPUT
          else
            echo "status=red" >> $GITHUB_OUTPUT
          fi

      # ── Git 活動ログ ────────────────────────────────────────────────────────

      - name: Collect git activity
        id: git
        run: |
          WEEK_COMMITS=$(git log --oneline --since="7 days ago" | wc -l | tr -d ' ')
          RECENT=$(git log --oneline --since="7 days ago" --format="- %s" | head -10)
          echo "commits=$WEEK_COMMITS" >> $GITHUB_OUTPUT
          {
            echo 'recent_commits<<EOF'
            echo "$RECENT"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      # ── 人間タスクの残件チェック ─────────────────────────────────────────────

      - name: Check human tasks
        id: human_tasks
        run: |
          # google-services.json が仮ファイルかどうか確認
          if [ -f android/app/google-services.json ]; then
            PROJECT_ID=$(python3 -c "import json; d=json.load(open('android/app/google-services.json')); print(d['project_info']['project_id'])" 2>/dev/null || echo "unknown")
            if [ "$PROJECT_ID" = "trust-car-platform" ]; then
              echo "gservices=placeholder" >> $GITHUB_OUTPUT
            else
              echo "gservices=real" >> $GITHUB_OUTPUT
            fi
          else
            echo "gservices=missing" >> $GITHUB_OUTPUT
          fi

          # GoogleService-Info.plist の存在確認
          if [ -f ios/Runner/GoogleService-Info.plist ]; then
            echo "gservice_ios=present" >> $GITHUB_OUTPUT
          else
            echo "gservice_ios=missing" >> $GITHUB_OUTPUT
          fi

          # HUMAN_TASKS.md の未チェック項目数
          if [ -f docs/HUMAN_TASKS.md ]; then
            OPEN=$(grep -c "^- \[ \]" docs/HUMAN_TASKS.md || echo "0")
            DONE=$(grep -c "^- \[x\]" docs/HUMAN_TASKS.md || echo "0")
            echo "open_tasks=$OPEN" >> $GITHUB_OUTPUT
            echo "done_tasks=$DONE" >> $GITHUB_OUTPUT
          else
            echo "open_tasks=unknown" >> $GITHUB_OUTPUT
            echo "done_tasks=0" >> $GITHUB_OUTPUT
          fi

      # ── レポートIssue作成 ────────────────────────────────────────────────────

      - name: Create PM Report Issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toLocaleDateString('ja-JP', {
              timeZone: 'Asia/Tokyo',
              year: 'numeric', month: '2-digit', day: '2-digit'
            });

            const testStatus = '${{ steps.tests.outputs.status }}' === 'green' ? '✅' : '🔴';
            const analyzeStatus = '${{ steps.analyze.outputs.status }}' === 'clean' ? '✅' : '⚠️';
            const passed = '${{ steps.tests.outputs.passed }}';
            const failed = '${{ steps.tests.outputs.failed }}';
            const analyzeIssues = '${{ steps.analyze.outputs.issue_count }}';
            const weekCommits = '${{ steps.git.outputs.commits }}';
            const recentCommits = `${{ steps.git.outputs.recent_commits }}`;

            // 人間タスク状況
            const gservices = '${{ steps.human_tasks.outputs.gservices }}';
            const gservicesIos = '${{ steps.human_tasks.outputs.gservice_ios }}';
            const openTasks = '${{ steps.human_tasks.outputs.open_tasks }}';
            const doneTasks = '${{ steps.human_tasks.outputs.done_tasks }}';

            const gservicesLabel = gservices === 'missing' ? '❌ 未配置' :
                                   gservices === 'placeholder' ? '⚠️ 仮ファイル（本番版に要更新）' : '✅ 配置済み';
            const gservicesIosLabel = gservicesIos === 'missing' ? '❌ 未配置' : '✅ 配置済み';

            const body = `## 📊 週次PM レポート — ${today}

            > 自動生成レポートです。毎週月曜 9:00 JST に更新されます。

            ---

            ## 🏥 プロダクト品質

            | 指標 | 結果 | 詳細 |
            |------|------|------|
            | テスト | ${testStatus} | ${passed} 件パス / ${failed} 件失敗 |
            | 静的解析 | ${analyzeStatus} | ${analyzeIssues === '0' ? 'No issues' : analyzeIssues + ' 件の指摘'} |

            ## 🚀 開発活動（直近7日間）

            **コミット数**: ${weekCommits} 件

            ${recentCommits || '*(今週のコミットなし)*'}

            ---

            ## 👤 人間対応タスク（ブロッカー確認）

            | タスク | 状態 |
            |--------|------|
            | \`google-services.json\`（Android） | ${gservicesLabel} |
            | \`GoogleService-Info.plist\`（iOS） | ${gservicesIosLabel} |
            | HUMAN_TASKS.md 未完了 | 📋 ${openTasks} 件残り（完了: ${doneTasks} 件） |

            ---

            ## 📋 今週のアクションアイテム

            ${gservices !== 'real' ? '- [ ] 🔴 **[P1・ブロッカー]** Firebase Console から `google-services.json` をダウンロードして `android/app/` に配置' : ''}
            ${gservicesIos === 'missing' ? '- [ ] 🔴 **[P1・ブロッカー]** Firebase Console から `GoogleService-Info.plist` をダウンロードして `ios/Runner/` に配置（Mac必要）' : ''}
            ${failed !== '0' ? `- [ ] 🔴 **[P0・バグ]** テスト失敗 ${failed} 件を修正する` : ''}
            - [ ] 📊 [HUMAN_TASKS.md](../blob/main/docs/HUMAN_TASKS.md) を確認して完了済みタスクにチェックを入れる
            - [ ] 今週の進捗を [CLAUDE_SESSION_NOTES.md](../blob/main/CLAUDE_SESSION_NOTES.md) に記録する

            ---

            *生成: GitHub Actions \`pm_report.yml\` | プロジェクト: trust-car-platform*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 週次PMレポート — ${today}`,
              body: body,
              labels: ['pm-report', 'weekly'],
            });
