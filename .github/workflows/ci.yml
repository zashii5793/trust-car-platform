name: CI

on:
  push:
    branches: [main, develop, 'claude/**']
  pull_request:
    branches: [main, develop]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib test

      - name: Analyze code
        run: flutter analyze --fatal-infos

      # Unit tests do not need the Firebase emulators — run them first so
      # the required gate is fast and independent of emulator availability.
      - name: Run unit tests with coverage
        run: flutter test --coverage --exclude-tags emulator

      # --- Emulator-backed integration tests (best effort) -----------------
      # Everything below is continue-on-error: emulator download/startup can
      # be flaky on hosted runners and must not block the required gate.
      - name: Setup Node.js (for Firebase CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (for Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Firebase CLI
        continue-on-error: true
        run: npm install -g firebase-tools

      - name: Start Firebase Emulators
        continue-on-error: true
        run: firebase emulators:start --only firestore,auth --project demo-trust-car &
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Wait for emulators to be ready
        continue-on-error: true
        # 120s: the first run downloads the Firestore emulator jar (~60MB)
        run: npx wait-on tcp:8080 tcp:9099 --timeout 120000

      - name: Run integration tests (emulator)
        run: flutter test test/integration/ --tags emulator
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: analyze-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Install Android SDK 36 and NDK
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | $SDKMANAGER "platforms;android-36" 2>&1 | tail -3
          echo "y" | $SDKMANAGER "ndk;28.2.13676358" 2>&1 | tail -3
          echo "y" | $SDKMANAGER "build-tools;36.0.0" 2>&1 | tail -3 || \
            echo "build-tools;36.0.0 not found, using existing build-tools"
          echo "y" | $SDKMANAGER --licenses 2>&1 | tail -3

      - name: Place google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          else
            cat > android/app/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "31421119456",
              "project_id": "trust-car-platform",
              "storage_bucket": "trust-car-platform.firebasestorage.app"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:31421119456:android:cc5714538a154c3f80c985",
                "android_client_info": { "package_name": "jp.trustcar.app" }
              },
              "oauth_client": [],
              "api_key": [{ "current_key": "AIzaSyDZQ4UK6IXiUKNJ3u1Cjup4nIEmiV97O0Q" }],
              "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
            }],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Build APK (debug)
        run: flutter build apk --debug --verbose

      - name: Locate APK (diagnostic)
        if: always()
        run: find . -name "*.apk" -type f 2>/dev/null | head -20 || echo "No APK found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
          if-no-files-found: warn

  build-ios:
    name: Build iOS
    runs-on: macos-15
    needs: analyze-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Place GoogleService-Info.plist
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_PLIST }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_PLIST }}' > ios/Runner/GoogleService-Info.plist
          else
            cat > ios/Runner/GoogleService-Info.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_KEY</key>
            <string>AIzaSyDZQ4UK6IXiUKNJ3u1Cjup4nIEmiV97O0Q</string>
            <key>GCM_SENDER_ID</key>
            <string>31421119456</string>
            <key>PLIST_VERSION</key>
            <string>1</string>
            <key>BUNDLE_ID</key>
            <string>jp.trustcar.app</string>
            <key>PROJECT_ID</key>
            <string>trust-car-platform</string>
            <key>STORAGE_BUCKET</key>
            <string>trust-car-platform.firebasestorage.app</string>
            <key>IS_ADS_ENABLED</key>
            <false/>
            <key>IS_ANALYTICS_ENABLED</key>
            <false/>
            <key>IS_APPINVITE_ENABLED</key>
            <true/>
            <key>IS_GCM_ENABLED</key>
            <true/>
            <key>IS_SIGNIN_ENABLED</key>
            <true/>
            <key>GOOGLE_APP_ID</key>
            <string>1:31421119456:ios:4320af5d1401f02c80c985</string>
          </dict>
          </plist>
          EOF
          fi

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign --debug --verbose

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-debug
          path: build/ios/iphoneos/
          retention-days: 7
          if-no-files-found: warn
