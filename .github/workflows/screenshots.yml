name: App Screenshots

# ストア申請前に手動実行、またはリリースタグで自動実行
on:
  workflow_dispatch:
    inputs:
      platform:
        description: '撮影対象'
        required: false
        default: 'android'
        type: choice
        options:
          - android
          - both
  push:
    tags:
      - 'v*'   # リリースタグでも自動実行

jobs:
  # ──────────────────────────────────────────────
  # Android スクリーンショット（Linux + エミュレーター）
  # ──────────────────────────────────────────────
  screenshots-android:
    name: Android Screenshots
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Place google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          else
            cat > android/app/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "31421119456",
              "project_id": "trust-car-platform",
              "storage_bucket": "trust-car-platform.firebasestorage.app"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:31421119456:android:cc5714538a154c3f80c985",
                "android_client_info": { "package_name": "jp.trustcar.app" }
              },
              "oauth_client": [],
              "api_key": [{ "current_key": "AIzaSyDZQ4UK6IXiUKNJ3u1Cjup4nIEmiV97O0Q" }],
              "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
            }],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Setup Node.js & Firebase CLI
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Start Firebase Emulators
        run: firebase emulators:start --only auth,firestore --project demo-trust-car &

      - name: Wait for emulators
        run: npx wait-on tcp:8080 tcp:9099 --timeout 30000

      - name: Create test user in emulator
        run: |
          curl -s -X POST \
            "http://localhost:9099/identitytoolkit.googleapis.com/v1/accounts:signUp?key=fake-api-key" \
            -H "Content-Type: application/json" \
            -d '{"email":"test@example.com","password":"test1234","returnSecureToken":true}' \
            | python3 -m json.tool

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          avd-name: pixel_6_api_33
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            mkdir -p screenshots/android

            # スクリーンショット撮影
            flutter test integration_test/screenshot_test.dart \
              --dart-define=USE_EMULATOR=true \
              -d emulator-5554 \
              2>&1 | tee screenshot_test_log.txt

            # binding.takeScreenshot() で生成されたファイルを収集
            find /sdcard/ -name "*.png" -exec adb pull {} screenshots/android/ \; 2>/dev/null || true
            find . -name "screenshot_*.png" -exec cp {} screenshots/android/ \; 2>/dev/null || true

            echo "撮影されたスクリーンショット:"
            ls screenshots/android/ || echo "(なし)"

      - name: Upload Android screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-android
          path: screenshots/android/
          retention-days: 30

  # ──────────────────────────────────────────────
  # iOS スクリーンショット（macOS + Simulator）
  # ──────────────────────────────────────────────
  screenshots-ios:
    name: iOS Screenshots
    runs-on: macos-latest
    if: github.event.inputs.platform == 'both' || startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Place GoogleService-Info.plist
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}' > ios/Runner/GoogleService-Info.plist
          else
            echo "⚠️ GOOGLE_SERVICE_INFO_PLIST secret not set — iOS screenshots may fail auth"
          fi

      - name: Setup Node.js & Firebase CLI
        run: npm install -g firebase-tools

      - name: Start Firebase Emulators
        run: firebase emulators:start --only auth,firestore --project demo-trust-car &

      - name: Wait for emulators
        run: npx wait-on tcp:8080 tcp:9099 --timeout 30000

      - name: Create test user in emulator
        run: |
          curl -s -X POST \
            "http://localhost:9099/identitytoolkit.googleapis.com/v1/accounts:signUp?key=fake-api-key" \
            -H "Content-Type: application/json" \
            -d '{"email":"test@example.com","password":"test1234","returnSecureToken":true}'

      - name: Boot iOS Simulator (iPhone 16 Pro Max = 6.9")
        run: |
          # ストア用: iPhone 16 Pro Max (最大サイズ)
          xcrun simctl boot "iPhone 16 Pro Max" || \
          xcrun simctl boot "iPhone 15 Pro Max" || \
          xcrun simctl boot "iPhone 14 Pro Max"
          open -a Simulator

      - name: Wait for simulator
        run: |
          until xcrun simctl list devices | grep -q "Booted"; do
            sleep 2
          done
          sleep 5

      - name: Run screenshot integration test
        run: |
          mkdir -p screenshots/ios

          SIMULATOR_ID=$(xcrun simctl list devices | grep "Booted" | \
            grep -oE "[0-9A-F-]{36}" | head -1)
          echo "Simulator ID: $SIMULATOR_ID"

          flutter test integration_test/screenshot_test.dart \
            --dart-define=USE_EMULATOR=true \
            -d "$SIMULATOR_ID" \
            2>&1 | tee screenshot_test_log.txt

          # xcrun で実機品質のスクリーンショットを撮影
          xcrun simctl io booted screenshot screenshots/ios/app_screenshot.png || true

          echo "撮影されたスクリーンショット:"
          ls screenshots/ios/

      - name: Upload iOS screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-ios
          path: screenshots/ios/
          retention-days: 30

  # ──────────────────────────────────────────────
  # 完了通知
  # ──────────────────────────────────────────────
  notify:
    name: Notify completion
    runs-on: ubuntu-latest
    needs: [screenshots-android]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 📸 スクリーンショット撮影完了" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Actions タブ → このワークフロー実行 → Artifacts から" >> $GITHUB_STEP_SUMMARY
          echo "スクリーンショットをダウンロードできます。" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ストア提出用サイズ確認" >> $GITHUB_STEP_SUMMARY
          echo "| プラットフォーム | 必要サイズ | 必要枚数 |" >> $GITHUB_STEP_SUMMARY
          echo "|----------------|-----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| App Store (iPhone 6.9\") | 1320×2868px | 最低3枚 |" >> $GITHUB_STEP_SUMMARY
          echo "| App Store (iPhone 6.5\") | 1242×2688px | 最低3枚 |" >> $GITHUB_STEP_SUMMARY
          echo "| Google Play | 1080×1920px以上 | 最低2枚、推奨8枚 |" >> $GITHUB_STEP_SUMMARY
